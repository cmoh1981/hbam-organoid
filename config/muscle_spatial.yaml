# HBAM Pipeline - Multi-Modal Muscle Aging Analysis
# Proteomics (PXD047296) + Spatial Transcriptomics
seed: 42
log_level: INFO

data:
  output_dir: results/muscle_spatial
  intermediate_dir: results/muscle_spatial/intermediate
  modalities:
    - name: muscle_proteomics
      path: data/raw/PXD047296/MuscleDIANNStep3report.pg_matrix.tsv
      format: diann
      species: mouse
      modality_type: temporal
      time_col: timepoint
      condition_col: condition
    - name: muscle_spatial
      path: data/raw/walter2024/spatial_muscle_combined.h5ad
      format: h5ad
      species: mouse
      modality_type: spatial

qc:
  missingness_threshold: 0.3
  min_presence: 0.7
  variance_percentile: 10.0
  min_genes_per_sample: 200
  min_samples_per_gene: 10
  max_mito_fraction: 0.2

normalization:
  proteomics_method: median
  spatial_method: scran
  pseudocount: 1.0
  log_transform: true

imputation:
  method: auto
  mnar_method: minprob
  mnar_quantile: 0.01
  mcar_method: knn
  knn_k: 5

integration:
  min_gene_overlap: 200
  scaling_method: zscore
  embedding_method: auto
  n_factors: 10
  convergence_tolerance: 0.0001

engine:
  gene_set_source: hybrid
  refinement_method: trajectory
  bootstrap_iterations: 5
  bootstrap_fraction: 0.8
  bootstrap_min_spearman: 0.7
  auto_flip_direction: true

translation:
  top_biomarkers: 20
  panel_sizes: [5, 10, 15, 20, 30, 50]
  effect_size_method: cohens_d

output:
  figure_formats: [pdf, png]
  figure_dpi: 300
  single_col_width: 3.5
  double_col_width: 7.0
  font_family: Arial
  font_size_label: 8
  font_size_title: 10
  colorblind_safe: true
  top_n_heatmap: 50
  top_n_volcano_labels: 10
  top_n_pathways: 20
